<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>playce — VALORANT マルチ募集</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --red:#ff4655;--red-d:#c73444;--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;
  --bdr:rgba(255,70,85,.2);--bdr2:rgba(255,70,85,.08);
  --txt:#e8e8f0;--mute:#6b7280;--green:#00d97e;--yellow:#f59e0b;--blue:#60a5fa;
  --card:#16161f;--card-h:#1e1e2e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(13,13,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr)}
.hdr-inner{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--txt);text-decoration:none;line-height:1}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:.5rem;color:var(--mute);letter-spacing:3px;text-transform:uppercase;margin-top:2px;display:block}
.hdr-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.72rem;font-family:'Rajdhani',sans-serif;color:var(--green);letter-spacing:1px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-post{background:var(--red);color:#fff;border:none;padding:9px 20px;border-radius:6px;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-post:hover{background:var(--red-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,70,85,.3)}

/* HERO */
.hero{background:linear-gradient(180deg,rgba(255,70,85,.06) 0%,transparent 100%);border-bottom:1px solid var(--bdr2);padding:32px 20px 28px}
.hero-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.hero-left h1{font-family:'Rajdhani',sans-serif;font-size:2.4rem;font-weight:700;letter-spacing:2px;line-height:1.1;color:var(--txt)}
.hero-left h1 em{color:var(--red);font-style:normal}
.hero-left p{font-size:.82rem;color:var(--mute);margin-top:8px;letter-spacing:.5px}
.hero-stats{display:flex;gap:32px}
.stat{text-align:center}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:2.8rem;font-weight:700;color:var(--red);line-height:1;display:flex;align-items:baseline;gap:4px}
.stat-num .stat-unit{font-size:1rem;color:var(--mute)}
.stat-label{font-size:.65rem;color:var(--mute);letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-family:'Rajdhani',sans-serif}
.stat-divider{width:1px;background:var(--bdr);align-self:stretch}

/* MAIN */
.main{max-width:1080px;margin:0 auto;padding:20px 20px}

/* FILTER BAR */
.filter-bar{background:rgba(19,19,31,.97);border:none;border-bottom:1px solid var(--bdr2);border-radius:0;padding:10px 20px;margin-bottom:0;position:sticky;top:57px;z-index:90;backdrop-filter:blur(12px)}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-row+.filter-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr2)}
.filter-label{font-size:.65rem;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;min-width:36px;flex-shrink:0}
.filter-group{display:flex;flex-wrap:wrap;gap:5px}
.filter-btn{background:transparent;border:1px solid var(--bdr);color:var(--mute);padding:4px 11px;border-radius:20px;font-size:.72rem;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.filter-btn:hover{border-color:rgba(255,70,85,.5);color:rgba(255,70,85,.8)}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.filter-clear{margin-left:auto;background:transparent;border:none;color:var(--mute);font-size:.7rem;cursor:pointer;padding:4px 8px;transition:.2s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}
.filter-clear:hover{color:var(--txt)}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-hdr h2{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mute)}
.count-badge{background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:2px 9px;border-radius:10px;font-family:'Rajdhani',sans-serif;min-width:22px;text-align:center}

/* CARD GRID */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:32px}

/* CARD */
.card{background:var(--card);border:1px solid var(--bdr2);border-radius:12px;padding:20px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,70,85,.03),transparent);opacity:0;transition:.3s}
.card:hover{background:var(--card-h);border-color:rgba(255,70,85,.3);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.card:hover::after{opacity:1}
.card-accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),rgba(255,70,85,0));opacity:0;transition:.3s}
.card:hover .card-accent{opacity:1}

/* CARD - PERSON HEADER (main change) */
.card-person{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.card-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-d));display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(255,70,85,.3)}
.card-person-info{flex:1;min-width:0}
.card-name{font-weight:700;font-size:1.05rem;color:var(--txt);letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-rank{display:inline-block;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.5px;margin-top:3px}
.rank-iron{background:rgba(120,100,80,.25);color:#a0856a}
.rank-bronze{background:rgba(180,100,50,.25);color:#c87d3a}
.rank-silver{background:rgba(180,180,180,.2);color:#aaa}
.rank-gold{background:rgba(255,190,60,.2);color:#f5c842}
.rank-plat{background:rgba(60,200,200,.2);color:#3cd6d6}
.rank-dia{background:rgba(80,120,255,.2);color:#7090ff}
.rank-asc{background:rgba(120,200,80,.2);color:#80c850}
.rank-imm{background:rgba(220,60,60,.2);color:#e04040}
.rank-radiant{background:rgba(255,210,60,.3);color:#ffd23f}
.rank-unranked{background:rgba(100,100,120,.2);color:#8888aa}

.card-comment{font-size:.85rem;color:rgba(232,232,240,.75);margin-bottom:12px;line-height:1.6;font-style:italic}
.vibe-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.vibe-tag{font-size:.66rem;padding:3px 9px;border-radius:12px;font-weight:700;background:rgba(255,70,85,.1);color:var(--red);border:1px solid rgba(255,70,85,.2);letter-spacing:.3px}
.vibe-tag.style{background:rgba(96,165,250,.1);color:var(--blue);border-color:rgba(96,165,250,.2)}

.card-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr2)}
.meta-item{display:flex;align-items:center;gap:4px;font-size:.72rem}
.meta-item svg{width:12px;height:12px;flex-shrink:0}
.meta-vc-on{color:var(--green)}
.meta-vc-off{color:var(--mute)}

.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.time-left{font-size:.7rem;color:var(--mute);display:flex;align-items:center;gap:4px;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.time-left.urgent{color:var(--yellow)}
.time-left.critical{color:#ff4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.time-left.expired{color:#ff4444}
.btn-join{background:var(--red);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-weight:700;font-size:.78rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;white-space:nowrap}
.btn-join:hover{background:var(--red-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,70,85,.4)}

/* EMPTY STATE */
.empty{text-align:center;padding:72px 20px;color:var(--mute)}
.empty-icon{font-size:3.5rem;margin-bottom:20px;opacity:.35}
.empty h3{font-family:'Rajdhani',sans-serif;font-size:1.1rem;letter-spacing:2px;margin-bottom:10px;color:var(--txt);opacity:.4}
.empty p{font-size:.82rem;line-height:1.8;margin-bottom:24px}
.empty .btn-empty{background:var(--red);color:#fff;border:none;padding:11px 28px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;transition:.2s}
.empty .btn-empty:hover{background:var(--red-d);transform:translateY(-1px)}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.overlay.show{display:flex}

/* POST MODAL */
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:500px;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;color:var(--txt)}
.modal-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--mute);font-size:1.4rem;cursor:pointer;line-height:1;transition:.2s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{color:var(--txt);background:var(--bg3)}
label{display:block;font-size:.67rem;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-family:'Rajdhani',sans-serif}
input[type=text],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:.88rem;margin-bottom:16px;font-family:'Noto Sans JP',sans-serif;transition:.2s;-webkit-appearance:none}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(255,70,85,.1)}
textarea{resize:vertical;min-height:76px}
select option{background:var(--bg3)}
.tag-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.tag-btn{background:var(--bg3);border:1px solid var(--bdr);color:var(--mute);padding:6px 13px;border-radius:16px;font-size:.75rem;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.tag-btn:hover{border-color:rgba(255,70,85,.4);color:rgba(255,70,85,.8)}
.tag-btn.sel{background:rgba(255,70,85,.15);border-color:var(--red);color:var(--red);font-weight:700}
.tag-btn.style-btn.sel{background:rgba(96,165,250,.15);border-color:var(--blue);color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-submit{width:100%;background:var(--red);color:#fff;border:none;padding:13px;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:2px;margin-top:4px}
.btn-submit:hover{background:var(--red-d);box-shadow:0 4px 16px rgba(255,70,85,.3)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.msg{text-align:center;font-size:.82rem;padding:9px;border-radius:6px;margin-top:10px}
.msg.ok{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2)}
.msg.err{background:rgba(255,70,85,.1);color:var(--red);border:1px solid rgba(255,70,85,.2)}

/* JOIN MODAL */
.join-modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:440px;padding:28px;position:relative}
.join-modal h3{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.join-modal .sub{font-size:.78rem;color:var(--mute);margin-bottom:18px;line-height:1.6}
.post-summary{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:14px;margin-bottom:18px}
.ps-person{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ps-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-d));display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:#fff;flex-shrink:0}
.ps-name{font-weight:700;font-size:.95rem}
.ps-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.disc-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:12px}
.disc-label{font-size:.63rem;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;margin-bottom:5px}
.disc-val{font-size:.95rem;color:var(--txt);font-weight:600;word-break:break-all}
.btn-copy{width:100%;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);color:var(--blue);padding:10px;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-copy:hover{background:rgba(96,165,250,.2)}
.btn-copy.copied{background:rgba(0,217,126,.12);border-color:rgba(0,217,126,.25);color:var(--green)}
.join-field-row{margin-bottom:14px}
.join-field-row label{margin-bottom:6px}
.btn-join-confirm{width:100%;background:var(--red);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-join-confirm:hover{background:var(--red-d);box-shadow:0 4px 16px rgba(255,70,85,.3)}
.btn-join-confirm:disabled{opacity:.5;cursor:not-allowed}

@media(max-width:640px){
  .cards{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .hero-inner{flex-direction:column;text-align:center}
  .hero-stats{justify-content:center}
  .hero-left h1{font-size:1.8rem}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <a class="logo" href="#">play<em>ce</em><span class="logo-sub">VALORANT マルチ募集</span></a>
    <div class="hdr-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="btn-post" onclick="openPost()">＋ 募集する</button>
    </div>
  </div>
</header>

<!-- HERO: 「今ここに人がいる」感 -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <h1>野良をなくす<br><em>仕間を見つけろ</em></h1>
      <p>VALORANT JP · 完全無料・登録不要</p>
    </div>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="heroCount" style="display:flex;align-items:center;gap:8px"><span id="heroDot" style="width:10px;height:10px;background:var(--green);border-radius:50%;display:inline-block;flex-shrink:0;animation:pulse 2s infinite"></span><span id="heroNum">0</span><span class="stat-unit">人</span></div>
        <div class="stat-label">NOW ONLINE</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">24<span class="stat-unit">h</span></div>
        <div class="stat-label">ALWAYS ON</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">0<span class="stat-unit">円</span></div>
        <div class="stat-label">FOREVER FREE</div>
      </div>
    </div>
  </div>
</section>

<main class="main">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">ランク</span>
      <div class="filter-group" id="filterRank">
        <button class="filter-btn" data-val="アンランクげド">アンランクげド</button>
        <button class="filter-btn" data-val="Iron">Iron</button>
        <button class="filter-btn" data-val="Bronze">Bronze</button>
        <button class="filter-btn" data-val="Silver">Silver</button>
        <button class="filter-btn" data-val="Gold">Gold</button>
        <button class="filter-btn" data-val="Platinum">Platinum</button>
        <button class="filter-btn" data-val="Diamond">Diamond</button>
        <button class="filter-btn" data-val="Ascendant">Ascendant</button>
        <button class="filter-btn" data-val="Immortal">Immortal</button>
        <button class="filter-btn" data-val="Radiant">Radiant</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">VC</span>
      <div class="filter-group" id="filterVC">
        <button class="filter-btn" data-val="あり">VCあり</button>
        <button class="filter-btn" data-val="なし">VCなし</button>
        <button class="filter-btn" data-val="聴き専門">聴き専門</button>
      </div>
      <span class="filter-label" style="margin-left:16px">雰囲気</span>
      <div class="filter-group" id="filterVibe">
        <button class="filter-btn" data-val="がち">がち</button>
        <button class="filter-btn" data-val="ゆるく">ゆるく</button>
        <button class="filter-btn" data-val="初心者歓迎">初心者歓迎</button>
        <button class="filter-btn" data-val="怒らない">怒らない</button>
        <button class="filter-btn" data-val="楽しくやりたい">楽しくやりたい</button>
      </div>
      <button class="filter-clear" onclick="clearFilters()">✕ リセット</button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="section-hdr">
    <h2>RECRUITING NOW</h2>
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <div class="cards" id="cardList"></div>

</main>

<!-- POST MODAL -->
<div class="overlay" id="postOverlay" onclick="closeOnBg(event,'postOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closePost()">×</button>
    <h2>募集を作る</h2>

    <label>表示名</label>
    <input type="text" id="pName" placeholder="Shadowstrike / くまさん など" maxlength="30">

    <div class="form-row">
      <div>
        <label>ランク帯</label>
        <select id="pRank">
          <option value="アンランクげド">アンランクげド</option>
          <option value="Iron">Iron</option>
          <option value="Bronze">Bronze</option>
          <option value="Silver">Silver</option>
          <option value="Gold">Gold</option>
          <option value="Platinum">Platinum</option>
          <option value="Diamond">Diamond</option>
          <option value="Ascendant">Ascendant</option>
          <option value="Immortal">Immortal</option>
          <option value="Radiant">Radiant</option>
        </select>
      </div>
      <div>
        <label>VC</label>
        <select id="pVC">
          <option value="あり">VCあり</option>
          <option value="なし">VCなし</option>
          <option value="聴き専門">聴き専門</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>募集人数</label>
        <select id="pSlots">
          <option value="1">1人募集</option>
          <option value="2">2人募集</option>
          <option value="3">3人募集</option>
          <option value="4">4人募集</option>
        </select>
      </div>
      <div>
        <label>有効時間</label>
        <select id="pDur">
          <option value="30">30分</option>
          <option value="60" selected>1時間</option>
          <option value="90">1.5時間</option>
          <option value="120">2時間</option>
          <option value="180">3時間</option>
        </select>
      </div>
    </div>

    <label>雰囲気タグ（複数可）</label>
    <div class="tag-grid" id="vibeTags">
      <button class="tag-btn" data-v="怒らない">怒らない</button>
      <button class="tag-btn" data-v="ゆるく">ゆるく</button>
      <button class="tag-btn" data-v="がち">がち</button>
      <button class="tag-btn" data-v="初心者歓迎">初心者歓迎</button>
      <button class="tag-btn" data-v="上手いと務まる">上手いと務まる</button>

<script>
const SUPABASE_URL = 'https://qbbqppmcbdjdbkuwvnxq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KqmpQ5cPiHv1mK8J01RkLQ_wqVia66w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const RANK_CLASS = {
  'アンランクげド':'unranked','Iron':'iron','Bronze':'bronze','Silver':'silver',
  'Gold':'gold','Platinum':'plat','Diamond':'dia','Ascendant':'asc',
  'Immortal':'imm','Radiant':'radiant'
};

let allPosts = [];
let activeFilters = {rank:null, vc:null, vibe:null};
let targetPost = null;

// ---- UTILS ----
function parseMeta(raw) {
  if (!raw) return {};
  try { return JSON.parse(raw); } catch(e) { return {vc: raw}; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getInitial(name) {
  return name ? name.trim()[0].toUpperCase() : '?';
}

function timeLeft(createdAt, durMin) {
  const created = new Date(createdAt);
  const expires = new Date(created.getTime() + (durMin||60) * 60000);
  const diff = expires - Date.now();
  if (diff <= 0) return {label:'期限切れ', cls:'expired', expired:true};
  const m = Math.ceil(diff / 60000);
  if (m <= 5)  return {label:'残り' + m + '分！', cls:'critical', expired:false};
  if (m <= 15) return {label:'残り' + m + '分', cls:'urgent', expired:false};
  if (m < 60)  return {label:'残り' + m + '分', cls:'', expired:false};
  const h = Math.floor(m/60), rm = m%60;
  return {label:'残り' + h + '時間' + (rm ? rm+'分' : ''), cls:'', expired:false};
}

// ---- FILTERS ----
document.querySelectorAll('#filterRank .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.rank = activeFilters.rank === val ? null : val;
    syncFilter('filterRank', activeFilters.rank);
    renderCards();
  });
});
document.querySelectorAll('#filterVC .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.vc = activeFilters.vc === val ? null : val;
    syncFilter('filterVC', activeFilters.vc);
    renderCards();
  });
});
document.querySelectorAll('#filterVibe .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.vibe = activeFilters.vibe === val ? null : val;
    syncFilter('filterVibe', activeFilters.vibe);
    renderCards();
  });
});

function syncFilter(groupId, active) {
  document.querySelectorAll('#' + groupId + ' .filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.val === active));
}

function clearFilters() {
  activeFilters = {rank:null, vc:null, vibe:null};
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  renderCards();
}

function applyFilters(posts) {
  return posts.filter(p => {
    const m = parseMeta(p.mode);
    if (activeFilters.rank && p.rank !== activeFilters.rank) return false;
    if (activeFilters.vc && m.vc !== activeFilters.vc) return false;
    if (activeFilters.vibe) {
      const tags = m.vibe_tags || [];
      if (!tags.includes(activeFilters.vibe)) return false;
    }
    return true;
  });
}

// ---- RENDER ----
function renderCards() {
  const list = document.getElementById('cardList');
  const badge = document.getElementById('countBadge');
  const filtered = applyFilters(allPosts).filter(p => {
    const m = parseMeta(p.mode);
    return !timeLeft(p.created_at, m.duration_min).expired;
  });

  // Update hero count
  const heroCount = document.getElementById('heroCount');
  if (heroCount) {
    const heroNum = document.getElementById('heroNum'); if(heroNum) heroNum.textContent = allPosts.length;
  }
  badge.textContent = filtered.length;

  if (filtered.length === 0) {
    const noFilter = !activeFilters.rank && !activeFilters.vc && !activeFilters.vibe;
    list.innerHTML = '<div class="empty">' +
      '<div class="empty-icon">🎮</div>' +
      '<h3>NO RECRUITMENTS</h3>' +
      '<p>' + (noFilter
        ? 'まだ募集がありません。<br>一番最初に作って、仕間を見つけよう！'
        : '条件に合う募集がありません。<br>フィルターを変えてみてください') + '</p>' +
      (noFilter ? '<button class="btn-empty" onclick="openPost()">今すぐ募集する</button>' : '') +
      '</div>';
    return;
  }

  list.innerHTML = filtered.map((p, idx) => {
    const m = parseMeta(p.mode);
    const ti = timeLeft(p.created_at, m.duration_min);
    const rc = RANK_CLASS[p.rank] || 'unranked';
    const initial = getInitial(p.name);
    const vibeTags = (m.vibe_tags || []).map(t =>
      '<span class="vibe-tag">' + esc(t) + '</span>').join('');
    const styleTags = (m.style_tags || []).map(t =>
      '<span class="vibe-tag style">' + esc(t) + '</span>').join('');
    const vc = m.vc || '';
    const vcOn = vc === 'あり';
    const micIcon = vcOn
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
    const slotsLabel = m.slots ? m.slots + '人募集' : '';
    const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

    return '<div class="card" onclick="openJoin(' + idx + ')">' +
      '<div class="card-accent"></div>' +
      '<div class="card-person">' +
        '<div class="card-avatar">' + esc(initial) + '</div>' +
        '<div class="card-person-info">' +
          '<div class="card-name">' + esc(p.name || '名無し') + '</div>' +
          '<span class="card-rank rank-' + rc + '">' + esc(p.rank) + '</span>' +
        '</div>' +
      '</div>' +
      (p.comment ? '<div class="card-comment">“' + esc(p.comment) + '”</div>' : '') +
      ((vibeTags || styleTags) ? '<div class="vibe-tags">' + vibeTags + styleTags + '</div>' : '') +
      '<div class="card-meta">' +
        (vc ? '<span class="meta-item ' + (vcOn?'meta-vc-on':'meta-vc-off') + '">' + micIcon + esc(vc) + '</span>' : '') +
        (slotsLabel ? '<span class="meta-item" style="color:var(--mute)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' + esc(slotsLabel) + '</span>' : '') +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="time-left ' + ti.cls + '">' + clockIcon + ti.label + '</span>' +
        '<button class="btn-join" onclick="event.stopPropagation();openJoin(' + idx + ')">一緒にプレイする</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ---- FETCH ----
async function fetchPosts() {
  const {data, error} = await sb.from('recruiting_posts')
    .select('*').order('created_at', {ascending:false});
  if (error) { console.error(error); return; }
  const now = Date.now();
  allPosts = (data||[]).filter(p => {
    const m = parseMeta(p.mode);
    return (new Date(p.created_at).getTime() + (m.duration_min||60)*60000) > now;
  });
  renderCards();
}

// デモ用モックデータ（DBが空のときのみ使用）

];


// フェッチ後、DBが空ならモックを使う
async function fetchPostsWithFallback() {
  await fetchPosts();
  if (allPosts.length === 0) {
    // DBが空のとき、モックデータをデモ表示
    allPosts = MOCK_POSTS.filter(p => {
      const m = parseMeta(p.mode);
      return (new Date(p.created_at).getTime() + (m.duration_min||60)*60000) > Date.now();
    });
    renderCards();
  }
}

fetchPostsWithFallback();
setInterval(fetchPosts, 30000);
// Refresh timer display every minute
setInterval(() => { if (allPosts.length) renderCards(); }, 60000);

// ---- POST MODAL ----
function openPost() {
  document.getElementById('postOverlay').classList.add('show');
}
function closePost() {
  document.getElementById('postOverlay').classList.remove('show');
  document.getElementById('postMsg').innerHTML = '';
}
function closeOnBg(e, id) {
  if (e.target.id === id) document.getElementById(id).classList.remove('show');
}

document.querySelectorAll('#vibeTags .tag-btn').forEach(btn =>
  btn.addEventListener('click', () => btn.classList.toggle('sel')));
document.querySelectorAll('#styleTags .tag-btn').forEach(btn =>
  btn.addEventListener('click', () => btn.classList.toggle('sel')));

async function submitPost() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showMsg('postMsg','err','表示名を入力してください'); return; }
  const rank = document.getElementById('pRank').value;
  const vc   = document.getElementById('pVC').value;
  const slots = parseInt(document.getElementById('pSlots').value);
  const dur  = parseInt(document.getElementById('pDur').value);
  const discord = document.getElementById('pDiscord').value.trim();
  const comment = document.getElementById('pComment').value.trim();
  const vibeTags = [...document.querySelectorAll('#vibeTags .tag-btn.sel')].map(b=>b.dataset.v);
  const styleTags = [...document.querySelectorAll('#styleTags .tag-btn.sel')].map(b=>b.dataset.s);
  const meta = JSON.stringify({vc, slots, duration_min:dur, discord_id:discord||null, vibe_tags:vibeTags, style_tags:styleTags});

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '投稿中…';

  const {error} = await sb.from('recruiting_posts').insert([{name, rank, comment:comment||null, mode:meta}]);
  btn.disabled = false; btn.textContent = '募集する';
  if (error) { showMsg('postMsg','err','エラー: '+error.message); return; }
  showMsg('postMsg','ok','募集を投稿しました！');
  setTimeout(()=>{ closePost(); fetchPosts(); resetPostForm(); }, 1200);
}

function resetPostForm() {
  ['pName','pDiscord','pComment'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('#vibeTags .tag-btn, #styleTags .tag-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('postMsg').innerHTML = '';
}

// ---- JOIN MODAL ----
function openJoin(idx) {
  targetPost = allPosts[idx];
  if (!targetPost) return;
  const p = targetPost;
  const m = parseMeta(p.mode);
  const rc = RANK_CLASS[p.rank] || 'unranked';
  const initial = getInitial(p.name);
  const vibeTags = (m.vibe_tags||[]).map(t=>'<span class="vibe-tag">'+esc(t)+'</span>').join('');
  const styleTags = (m.style_tags||[]).map(t=>'<span class="vibe-tag style">'+esc(t)+'</span>').join('');

  document.getElementById('joinSummary').innerHTML =
    '<div class="ps-person">' +
      '<div class="ps-avatar">'+esc(initial)+'</div>' +
      '<div><div class="ps-name">'+esc(p.name||'名無し')+'</div>' +
      '<span class="card-rank rank-'+rc+'" style="font-size:.68rem">'+esc(p.rank)+'</span></div>' +
    '</div>' +
    (p.comment ? '<div style="font-size:.8rem;color:var(--mute);font-style:italic;margin-bottom:6px">“'+esc(p.comment)+'”</div>' : '') +
    ((vibeTags||styleTags) ? '<div class="ps-tags">'+vibeTags+styleTags+'</div>' : '');

  const discBox = document.getElementById('joinDiscordBox');
  if (m.discord_id) {
    document.getElementById('joinDiscordVal').textContent = m.discord_id;
    discBox.style.display = 'block';
  } else {
    discBox.style.display = 'none';
  }
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>IDをコピーする';
  copyBtn.classList.remove('copied');
  document.getElementById('joinMyDiscord').value = '';
  document.getElementById('joinMsg').innerHTML = '';
  document.getElementById('joinConfirmBtn').disabled = false;
  document.getElementById('joinConfirmBtn').textContent = '参加申請を送る';
  document.getElementById('joinOverlay').classList.add('show');
}

function closeJoin() {
  document.getElementById('joinOverlay').classList.remove('show');
  targetPost = null;
}

function copyDiscord() {
  const val = document.getElementById('joinDiscordVal').textContent;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '✔️ コピー完了！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>IDをコピーする';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('joinDiscordVal'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}

async function confirmJoin() {
  if (!targetPost) return;
  const myDiscord = document.getElementById('joinMyDiscord').value.trim();
  const btn = document.getElementById('joinConfirmBtn');
  btn.disabled = true; btn.textContent = '送信中…';
  const {error} = await sb.from('join_requests').insert([{post_id:targetPost.id, requester_discord:myDiscord||null}]);
  btn.disabled = false; btn.textContent = '参加申請を送る';
  if (error) { showMsg('joinMsg','err','エラー: '+error.message); return; }
  showMsg('joinMsg','ok','申請しました！Discord IDをコピーして募集者にコンタクトしてみてください。');
  setTimeout(() => closeJoin(), 2000);
}

function showMsg(id, cls, text) {
  document.getElementById(id).innerHTML = '<div class="msg '+cls+'">'+text+'</div>';
}
</script>
