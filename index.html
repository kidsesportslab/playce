<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>playce — VALORANT マルチ募集</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --red:#ff4655;--red-d:#c73444;--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;
  --bdr:rgba(255,70,85,.2);--bdr2:rgba(255,70,85,.08);
  --txt:#e8e8f0;--mute:#6b7280;--green:#00d97e;--yellow:#f59e0b;--blue:#60a5fa;
  --card:#16161f;--card-h:#1e1e2e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(13,13,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr)}
.hdr-inner{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--txt);text-decoration:none}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:.55rem;color:var(--mute);letter-spacing:3px;text-transform:uppercase;margin-top:-4px;display:block}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-post{background:var(--red);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-post:hover{background:var(--red-d);transform:translateY(-1px)}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.7rem;font-family:'Rajdhani',sans-serif;color:var(--green);letter-spacing:1px}

/* MAIN */
.main{max-width:1080px;margin:0 auto;padding:24px 20px}

/* FILTER BAR */
.filter-bar{background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;padding:14px 18px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-label{font-size:.7rem;color:var(--mute);letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;min-width:40px}
.filter-group{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.filter-btn{background:transparent;border:1px solid var(--bdr);color:var(--mute);padding:5px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.filter-btn:hover,.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.filter-sep{width:100%;height:1px;background:var(--bdr2)}
.filter-clear{background:transparent;border:none;color:var(--mute);font-size:.72rem;cursor:pointer;padding:4px 8px;border-radius:4px;transition:.2s;white-space:nowrap}
.filter-clear:hover{color:var(--txt)}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-hdr h2{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt)}
.count-badge{background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;font-family:'Rajdhani',sans-serif}

/* CARD GRID */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:32px}

/* CARD */
.card{background:var(--card);border:1px solid var(--bdr2);border-radius:12px;padding:18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);opacity:0;transition:.2s}
.card:hover{background:var(--card-h);border-color:var(--bdr);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,70,85,.08)}
.card:hover::before{opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-name{font-weight:700;font-size:1rem;color:var(--txt)}
.card-rank{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;padding:3px 10px;border-radius:12px;letter-spacing:.5px}
.rank-iron{background:rgba(120,100,80,.25);color:#a0856a}
.rank-bronze{background:rgba(180,100,50,.25);color:#c87d3a}
.rank-silver{background:rgba(180,180,180,.2);color:#aaa}
.rank-gold{background:rgba(255,190,60,.2);color:#f5c842}
.rank-plat{background:rgba(60,200,200,.2);color:#3cd6d6}
.rank-dia{background:rgba(80,120,255,.2);color:#7090ff}
.rank-asc{background:rgba(120,200,80,.2);color:#80c850}
.rank-imm{background:rgba(220,60,60,.2);color:#e04040}
.rank-radiant{background:rgba(255,210,60,.3);color:#ffd23f}
.rank-unranked{background:rgba(100,100,120,.2);color:#8888aa}
.card-comment{font-size:.875rem;color:var(--txt);margin-bottom:12px;line-height:1.5;opacity:.9}
.vibe-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.vibe-tag{font-size:.68rem;padding:3px 9px;border-radius:12px;font-weight:700;background:rgba(255,70,85,.1);color:var(--red);border:1px solid rgba(255,70,85,.2)}
.vibe-tag.style{background:rgba(96,165,250,.1);color:var(--blue);border-color:rgba(96,165,250,.2)}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.meta-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--mute)}
.meta-item svg{width:13px;height:13px;flex-shrink:0}
.meta-vc-on{color:var(--green)}
.meta-vc-off{color:var(--mute)}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.time-left{font-size:.7rem;color:var(--mute);display:flex;align-items:center;gap:4px}
.time-left.urgent{color:var(--yellow)}
.time-left.expired{color:#ff4444}
.btn-join{background:var(--red);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-weight:700;font-size:.8rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-join:hover{background:var(--red-d);transform:translateY(-1px)}

/* EMPTY STATE */
.empty{text-align:center;padding:64px 20px;color:var(--mute)}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.empty h3{font-family:'Rajdhani',sans-serif;font-size:1.1rem;letter-spacing:2px;margin-bottom:8px;color:var(--txt);opacity:.5}
.empty p{font-size:.82rem;line-height:1.7}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.show{display:flex}

/* POST MODAL */
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:500px;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;color:var(--txt)}
.modal-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--mute);font-size:1.3rem;cursor:pointer;line-height:1;transition:.2s}
.modal-close:hover{color:var(--txt)}
label{display:block;font-size:.72rem;color:var(--mute);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'Rajdhani',sans-serif}
input[type=text],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:.9rem;margin-bottom:16px;font-family:'Noto Sans JP',sans-serif;transition:.2s}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);background:rgba(26,26,46,.8)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
.tag-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.tag-btn{background:var(--bg3);border:1px solid var(--bdr);color:var(--mute);padding:6px 13px;border-radius:16px;font-size:.75rem;cursor:pointer;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.tag-btn:hover{border-color:var(--red);color:var(--red)}
.tag-btn.sel{background:rgba(255,70,85,.15);border-color:var(--red);color:var(--red);font-weight:700}
.tag-btn.style-btn.sel{background:rgba(96,165,250,.15);border-color:var(--blue);color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-submit{width:100%;background:var(--red);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:2px;margin-top:4px}
.btn-submit:hover{background:var(--red-d)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.msg{text-align:center;font-size:.82rem;padding:8px;border-radius:6px;margin-top:10px}
.msg.ok{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2)}
.msg.err{background:rgba(255,70,85,.1);color:var(--red);border:1px solid rgba(255,70,85,.2)}

/* JOIN MODAL */
.join-modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:440px;padding:28px;position:relative}
.join-modal h3{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.join-modal .sub{font-size:.8rem;color:var(--mute);margin-bottom:20px}
.join-modal .post-summary{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:12px;margin-bottom:20px}
.join-modal .post-summary .ps-name{font-weight:700;font-size:.9rem;margin-bottom:4px}
.join-modal .post-summary .ps-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.disc-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;margin-bottom:12px}
.disc-label{font-size:.68rem;color:var(--mute);letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;margin-bottom:4px}
.disc-val{font-size:.95rem;color:var(--txt);font-weight:600;word-break:break-all}
.btn-copy{width:100%;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:var(--blue);padding:10px;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:10px}
.btn-copy:hover{background:rgba(96,165,250,.25)}
.btn-copy.copied{background:rgba(0,217,126,.15);border-color:rgba(0,217,126,.3);color:var(--green)}
.join-field-row{margin-bottom:14px}
.join-field-row label{margin-bottom:6px}
.btn-join-confirm{width:100%;background:var(--red);color:#fff;border:none;padding:11px;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.btn-join-confirm:hover{background:var(--red-d)}
.btn-join-confirm:disabled{opacity:.5;cursor:not-allowed}

@media(max-width:640px){
  .cards{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .hdr-inner{padding:10px 16px}
  .main{padding:16px}
  .filter-bar{padding:12px 14px}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <a class="logo" href="#">play<em>ce</em><span class="logo-sub">VALORANT マルチ募集</span></a>
    <div class="hdr-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="btn-post" onclick="openPost()">＋ 募集する</button>
    </div>
  </div>
</header>

<main class="main">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <span class="filter-label">ランク</span>
      <div class="filter-group" id="filterRank">
        <button class="filter-btn" data-val="アンランクげド">アンランクげド</button>
        <button class="filter-btn" data-val="Iron">Iron</button>
        <button class="filter-btn" data-val="Bronze">Bronze</button>
        <button class="filter-btn" data-val="Silver">Silver</button>
        <button class="filter-btn" data-val="Gold">Gold</button>
        <button class="filter-btn" data-val="Platinum">Platinum</button>
        <button class="filter-btn" data-val="Diamond">Diamond</button>
        <button class="filter-btn" data-val="Ascendant">Ascendant</button>
        <button class="filter-btn" data-val="Immortal">Immortal</button>
        <button class="filter-btn" data-val="Radiant">Radiant</button>
      </div>
    </div>
    <div class="filter-sep"></div>
    <div style="display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap">
      <span class="filter-label">VC</span>
      <div class="filter-group" id="filterVC">
        <button class="filter-btn" data-val="あり">VCあり</button>
        <button class="filter-btn" data-val="なし">VCなし</button>
        <button class="filter-btn" data-val="聴き専門">聴き専門</button>
      </div>
      <span class="filter-label" style="margin-left:8px">雰囲気</span>
      <div class="filter-group" id="filterVibe">
        <button class="filter-btn" data-val="がち">がち</button>
        <button class="filter-btn" data-val="ゆるく">ゆるく</button>
        <button class="filter-btn" data-val="初心者歓迎">初心者歓迎</button>

      <button class="filter-clear" onclick="clearFilters()">✕ リセット</button>

  <!-- ACTIVE POSTS -->
  <div class="section-hdr">
    <h2>募集中</h2>
    <span class="count-badge" id="countBadge">0</span>
  </div>
  <div class="cards" id="cardList"></div>

</main>

<!-- POST MODAL -->
<div class="overlay" id="postOverlay" onclick="closeOnBg(event,'postOverlay')">
  <div class="modal">
    <button class="modal-close" onclick="closePost()">×</button>
    <h2>募集を作る</h2>

    <label>表示名</label>
    <input type="text" id="pName" placeholder="Shadowstrike / くまさん など" maxlength="30">

    <div class="form-row">
      <div>
        <label>ランク帯</label>
        <select id="pRank">
          <option value="アンランクげド">アンランクげド</option>
          <option value="Iron">Iron</option>
          <option value="Bronze">Bronze</option>
          <option value="Silver">Silver</option>
          <option value="Gold">Gold</option>
          <option value="Platinum">Platinum</option>
          <option value="Diamond">Diamond</option>
          <option value="Ascendant">Ascendant</option>
          <option value="Immortal">Immortal</option>
          <option value="Radiant">Radiant</option>
        </select>
      </div>
      <div>
        <label>VC</label>
        <select id="pVC">
          <option value="あり">VCあり</option>
          <option value="なし">VCなし</option>
          <option value="聴き専門">聴き専門</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>募集人数</label>
        <select id="pSlots">
          <option value="1">1人募集</option>
          <option value="2">2人募集</option>
          <option value="3">3人募集</option>
          <option value="4">4人募集</option>

      </div>
      <div>
        <label>有効時間</label>
        <select id="pDur">
          <option value="30">30分</option>
          <option value="60" selected>1時間</option>

          <option value="120">2時間</option>
          <option value="180">3時間</option>
        </select>
      </div>
    </div>

    <label>雰囲気タグ（複数可）</label>
    <div class="tag-grid" id="vibeTags">
      <button class="tag-btn" data-v="怒らない">怒らない</button>
      <button class="tag-btn" data-v="ゆるく">ゆるく</button>
      <button class="tag-btn" data-v="がち">がち</button>
      <button class="tag-btn" data-v="初心者歓迎">初心者歓迎</button>
      <button class="tag-btn" data-v="上手いと務まる">上手いと務まる</button>
      <button class="tag-btn" data-v="絶対勝ちたい">絶対勝ちたい</button>
      <button class="tag-btn" data-v="楽しくやりたい">楽しくやりたい</button>
      <button class="tag-btn" data-v="指示歓迎">指示歓迎</button>

    <label>プレイスタイル（複数可）</label>
    <div class="tag-grid" id="styleTags">
      <button class="tag-btn style-btn" data-s="エンジョイ">エンジョイ</button>
      <button class="tag-btn style-btn" data-s="ランク上げ">ランク上げ</button>
      <button class="tag-btn style-btn" data-s="デュアル歓迎">デュアル歓迎</button>
      <button class="tag-btn style-btn" data-s="スパイク希望">スパイク希望</button>
      <button class="tag-btn style-btn" data-s="コントローラー希望">コントローラー希望</button>
      <button class="tag-btn style-btn" data-s="ロール就く">ロール就く</button>
    </div>

    <label>Discord ID / ゲーム内タグ（参加者に見える）</label>
    <input type="text" id="pDiscord" placeholder="username#0000 または username" maxlength="60">

    <label>コメント（任意）</label>
    <textarea id="pComment" placeholder="「ランクのびたい！少しくらい話せると嬉しい」「絶対視野超大事」など" maxlength="120"></textarea>

    <button class="btn-submit" id="submitBtn" onclick="submitPost()">募集する</button>
    <div id="postMsg"></div>
  </div>
</div>

<!-- JOIN MODAL -->
<div class="overlay" id="joinOverlay" onclick="closeOnBg(event,'joinOverlay')">
  <div class="join-modal">
    <button class="modal-close" onclick="closeJoin()">×</button>
    <h3>一纒にプレイする</h3>
    <p class="sub">参加申請を送り、募集者に連絡してみよう</p>

    <div class="post-summary" id="joinSummary"></div>

    <div id="joinDiscordBox" style="display:none">
      <div class="disc-box">
        <div class="disc-label">Discord ID / ゲーム内タグ</div>
        <div class="disc-val" id="joinDiscordVal">—</div>
      </div>
      <button class="btn-copy" id="copyBtn" onclick="copyDiscord()">📋 IDをコピーする</button>
    </div>

    <div class="join-field-row">
      <label>あなたのDiscord ID / ゲーム内タグ（任意）</label>
      <input type="text" id="joinMyDiscord" placeholder="username#0000 または username" maxlength="60" style="margin-bottom:8px">
    </div>

    <button class="btn-join-confirm" id="joinConfirmBtn" onclick="confirmJoin()">参加申請を送る</button>
    <div id="joinMsg"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qbbqppmcbdjdbkuwvnxq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KqmpQ5cPiHv1mK8J01RkLQ_wqVia66w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const RANK_CLASS = {
  'アンランクげド':'unranked','Iron':'iron','Bronze':'bronze','Silver':'silver',
  'Gold':'gold','Platinum':'plat','Diamond':'dia','Ascendant':'asc',
  'Immortal':'imm','Radiant':'radiant'
};

let allPosts = [];
let activeFilters = {rank:null, vc:null, vibe:null};
let targetPost = null;

// Parse extra data stored in 'mode' field as JSON
function parseMeta(raw) {
  if (!raw) return {};
  try { return JSON.parse(raw); } catch(e) { return {vc: raw}; }
}

// ---- FILTER LOGIC ----
document.querySelectorAll('#filterRank .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.rank = activeFilters.rank === val ? null : val;
    syncFilterUI('filterRank', activeFilters.rank);
    renderCards();
  });
});
document.querySelectorAll('#filterVC .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.vc = activeFilters.vc === val ? null : val;
    syncFilterUI('filterVC', activeFilters.vc);
    renderCards();
  });
});
document.querySelectorAll('#filterVibe .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    activeFilters.vibe = activeFilters.vibe === val ? null : val;
    syncFilterUI('filterVibe', activeFilters.vibe);
    renderCards();
  });
});

function syncFilterUI(groupId, active) {
  document.querySelectorAll('#' + groupId + ' .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === active);
  });
}

function clearFilters() {
  activeFilters = {rank:null, vc:null, vibe:null};
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  renderCards();
}

function applyFilters(posts) {
  return posts.filter(p => {
    const m = parseMeta(p.mode);
    if (activeFilters.rank && p.rank !== activeFilters.rank) return false;
    if (activeFilters.vc && m.vc !== activeFilters.vc) return false;
    if (activeFilters.vibe) {
      const tags = m.vibe_tags || [];
      if (!tags.includes(activeFilters.vibe)) return false;
    }
    return true;
  });
}

// ---- TIME HELPERS ----
function timeLeft(createdAt, durMin) {
  const created = new Date(createdAt);
  const expires = new Date(created.getTime() + durMin * 60000);
  const now = new Date();
  const diff = expires - now;
  if (diff <= 0) return {label:'期限切れ', cls:'expired', expired:true};
  const m = Math.ceil(diff / 60000);
  if (m <= 10) return {label:'残り' + m + '分', cls:'urgent', expired:false};
  if (m < 60) return {label:'残り' + m + '分', cls:'', expired:false};
  const h = Math.floor(m/60), rm = m%60;
  return {label:'残り' + h + '時間' + (rm ? rm+'分' : ''), cls:'', expired:false};
}

// ---- RENDER ----
function renderCards() {
  const list = document.getElementById('cardList');
  const badge = document.getElementById('countBadge');
  const filtered = applyFilters(allPosts);
  badge.textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎮</div><h3>NO RECRUITMENTS</h3><p>' +
      (allPosts.length === 0
        ? 'まだ募集がありません。<br>お手の募集を最初に作りましょう！'
        : '条件に合う募集がありません。<br>フィルターを変えてみてください') +
      '</p></div>';
    return;
  }

  list.innerHTML = filtered.map((p, idx) => {
    const m = parseMeta(p.mode);
    const ti = timeLeft(p.created_at, m.duration_min || 60);
    if (ti.expired) return '';
    const rc = RANK_CLASS[p.rank] || 'unranked';
    const vibeTags = (m.vibe_tags || []).map(t =>
      '<span class="vibe-tag">' + esc(t) + '</span>').join('');
    const styleTags = (m.style_tags || []).map(t =>
      '<span class="vibe-tag style">' + esc(t) + '</span>').join('');
    const vc = m.vc || 'VCなし';
    const vcOn = m.vc === 'あり';
    const vcIcon = vcOn
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/></svg>';
    const slotsLabel = m.slots ? m.slots + '人募集' : '';
    return '<div class="card" onclick="openJoin(' + idx + ')">' +
      '<div class="card-top">' +
        '<span class="card-name">' + esc(p.name || '名無し') + '</span>' +
        '<span class="card-rank rank-' + rc + '">' + esc(p.rank) + '</span>' +
      '</div>' +
      (p.comment ? '<div class="card-comment">“' + esc(p.comment) + '”</div>' : '') +
      ((vibeTags || styleTags) ? '<div class="vibe-tags">' + vibeTags + styleTags + '</div>' : '') +
      '<div class="card-meta">' +
        '<span class="meta-item ' + (vcOn?'meta-vc-on':'meta-vc-off') + '">' + vcIcon + esc(vc) + '</span>' +
        (slotsLabel ? '<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' + slotsLabel + '</span>' : '') +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="time-left ' + ti.cls + '"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + ti.label + '</span>' +
        '<button class="btn-join" onclick="event.stopPropagation();openJoin(' + idx + ')">参加する ▶</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- FETCH POSTS ----
async function fetchPosts() {
  const {data, error} = await sb.from('recruiting_posts').select('*').order('created_at', {ascending:false});
  if (error) { console.error(error); return; }
  const now = Date.now();
  allPosts = (data || []).filter(p => {
    const m = parseMeta(p.mode);
    const exp = new Date(p.created_at).getTime() + (m.duration_min || 60) * 60000;
    return exp > now;
  });
  renderCards();
}

fetchPosts();
setInterval(fetchPosts, 30000);

// ---- POST MODAL ----
function openPost() {
  document.getElementById('postOverlay').classList.add('show');
}
function closePost() {
  document.getElementById('postOverlay').classList.remove('show');
  document.getElementById('postMsg').innerHTML = '';
}
function closeOnBg(e, id) {
  if (e.target.id === id) document.getElementById(id).classList.remove('show');
}

document.querySelectorAll('#vibeTags .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('sel'));
});
document.querySelectorAll('#styleTags .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('sel'));
});

async function submitPost() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showMsg('postMsg','err','表示名を入力してください'); return; }
  const rank = document.getElementById('pRank').value;
  const vc = document.getElementById('pVC').value;
  const slots = parseInt(document.getElementById('pSlots').value);
  const dur = parseInt(document.getElementById('pDur').value);
  const discord = document.getElementById('pDiscord').value.trim();
  const comment = document.getElementById('pComment').value.trim();
  const vibeTags = [...document.querySelectorAll('#vibeTags .tag-btn.sel')].map(b => b.dataset.v);
  const styleTags = [...document.querySelectorAll('#styleTags .tag-btn.sel')].map(b => b.dataset.s);

  // Pack extra data into mode column as JSON
  const meta = JSON.stringify({vc, slots, duration_min:dur, discord_id:discord||null, vibe_tags:vibeTags, style_tags:styleTags});

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '投稿中…';

  const {error} = await sb.from('recruiting_posts').insert([{
    name, rank, comment: comment || null, mode: meta
  }]);

  btn.disabled = false; btn.textContent = '募集する';
  if (error) { showMsg('postMsg','err','エラー: ' + error.message); return; }
  showMsg('postMsg','ok','募集を投稿しました！');
  setTimeout(() => { closePost(); fetchPosts(); resetPostForm(); }, 1200);
}

function resetPostForm() {
  document.getElementById('pName').value = '';
  document.getElementById('pDiscord').value = '';
  document.getElementById('pComment').value = '';
  document.querySelectorAll('#vibeTags .tag-btn, #styleTags .tag-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('postMsg').innerHTML = '';
}

// ---- JOIN MODAL ----
function openJoin(idx) {
  targetPost = allPosts[idx];
  if (!targetPost) return;
  const p = targetPost;
  const m = parseMeta(p.mode);
  const rc = RANK_CLASS[p.rank] || 'unranked';
  const vibeTags = (m.vibe_tags || []).map(t => '<span class="vibe-tag">' + esc(t) + '</span>').join('');
  const styleTags = (m.style_tags || []).map(t => '<span class="vibe-tag style">' + esc(t) + '</span>').join('');
  document.getElementById('joinSummary').innerHTML =
    '<div class="ps-name">' + esc(p.name || '名無し') +
    ' <span class="card-rank rank-' + rc + '" style="font-size:.75rem">' + esc(p.rank) + '</span></div>' +
    (p.comment ? '<div style="font-size:.8rem;color:var(--mute);margin-top:4px">' + esc(p.comment) + '</div>' : '') +
    ((vibeTags||styleTags) ? '<div class="ps-tags">' + vibeTags + styleTags + '</div>' : '');

  const discBox = document.getElementById('joinDiscordBox');
  if (m.discord_id) {
    document.getElementById('joinDiscordVal').textContent = m.discord_id;
    discBox.style.display = 'block';
  } else {
    discBox.style.display = 'none';
  }
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '📋 IDをコピーする';
  copyBtn.classList.remove('copied');
  document.getElementById('joinMyDiscord').value = '';
  document.getElementById('joinMsg').innerHTML = '';
  document.getElementById('joinConfirmBtn').disabled = false;
  document.getElementById('joinConfirmBtn').textContent = '参加申請を送る';
  document.getElementById('joinOverlay').classList.add('show');
}

function closeJoin() {
  document.getElementById('joinOverlay').classList.remove('show');
  targetPost = null;
}

function copyDiscord() {
  const val = document.getElementById('joinDiscordVal').textContent;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✔ コピー完了！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 IDをコピーする';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function confirmJoin() {
  if (!targetPost) return;
  const myDiscord = document.getElementById('joinMyDiscord').value.trim();
  const btn = document.getElementById('joinConfirmBtn');
  btn.disabled = true; btn.textContent = '送信中…';

  const {error} = await sb.from('join_requests').insert([{
    post_id: targetPost.id,
    requester_discord: myDiscord || null
  }]);

  btn.disabled = false; btn.textContent = '参加申請を送る';
  if (error) { showMsg('joinMsg','err','エラー: ' + error.message); return; }
  showMsg('joinMsg','ok','申請しました！募集者のDiscord IDをコピーしてコンタクトしてみてください。');
  setTimeout(() => closeJoin(), 2000);
}

function showMsg(id, cls, text) {
  document.getElementById(id).innerHTML = '<div class="msg ' + cls + '">' + text + '</div>';
}
</script>
