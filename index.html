<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>playce — VALORANT マルチ募集</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--red:#ff4655;--red-d:#c73444;--bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--bdr:rgba(255,70,85,.2);--bdr2:rgba(255,70,85,.08);--txt:#e8e8f0;--mute:#6b6b8a;--grn:#4ade80;--grn-d:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
header{position:sticky;top:0;z-index:100;background:rgba(13,13,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.8rem;letter-spacing:4px;text-transform:uppercase;color:var(--txt)}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:.6rem;color:var(--mute);letter-spacing:3px;text-transform:uppercase;margin-top:-5px}
.hdr-right{display:flex;align-items:center;gap:14px}
.hdr-inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.live-badge{display:flex;align-items:center;gap:6px;font-size:.75rem;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--grn)}
.live-dot{width:7px;height:7px;background:var(--grn);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.post-btn{background:var(--red);color:#fff;border:none;padding:9px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .2s}
.post-btn:hover{background:var(--red-d)}
.hero{background:linear-gradient(135deg,#0d0d14 0%,#1a0a0e 50%,#0d0d14 100%);border-bottom:1px solid var(--bdr);padding:60px 24px 50px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(255,70,85,.06) 0%,transparent 60%);pointer-events:none}
.eyebrow{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:16px}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,6vw,4rem);font-weight:700;line-height:1.1;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
.hero h1 em{color:var(--red);font-style:normal}
.hero-desc{color:var(--mute);font-size:.95rem;margin-bottom:32px}
.hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.hero-stats>div{text-align:center}
.stat-n{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:var(--red)}
.stat-l{font-size:.7rem;color:var(--mute);letter-spacing:2px;text-transform:uppercase}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin-top:40px}
.wrap{max-width:1080px;margin:0 auto;padding:36px 24px 80px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--mute)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-left:10px}
.fb{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:transparent;color:var(--mute);border:1px solid var(--bdr2);padding:5px 14px;border-radius:2px;cursor:pointer;transition:all .2s}
.fb.on,.fb:hover{border-color:var(--red);color:var(--red);background:rgba(255,70,85,.05)}
.cnt{font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--mute);letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:14px}
.card{position:relative;background:var(--bg2);border:1px solid var(--bdr2);border-radius:4px;padding:18px 20px;transition:all .25s;cursor:default}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),rgba(255,70,85,0));opacity:0;transition:opacity .25s}
.card:hover{border-color:rgba(255,70,85,.35);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.card:hover::before{opacity:1}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.c-name{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;color:var(--txt);word-break:break-all}
.badge{flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.b-any{background:rgba(108,99,255,.15);color:#a09bff;border:1px solid rgba(108,99,255,.25)}
.b-bronze{background:rgba(123,94,59,.2);color:#c8956a;border:1px solid rgba(123,94,59,.35)}
.b-silver{background:rgba(140,140,140,.15);color:#c0c0c0;border:1px solid rgba(140,140,140,.3)}
.b-gold{background:rgba(201,162,39,.15);color:#e8c547;border:1px solid rgba(201,162,39,.3)}
.b-plat{background:rgba(0,180,180,.12);color:#4dd4d4;border:1px solid rgba(0,180,180,.25)}
.b-diamond{background:rgba(100,100,255,.15);color:#a0a0ff;border:1px solid rgba(100,100,255,.3)}
.b-asc{background:rgba(255,70,85,.12);color:#ff7080;border:1px solid rgba(255,70,85,.25)}
.b-imm{background:rgba(255,150,50,.12);color:#ffb060;border:1px solid rgba(255,150,50,.25)}
.b-rad{background:rgba(255,220,50,.15);color:#ffe040;border:1px solid rgba(255,220,50,.3)}
.c-mode{font-size:.78rem;color:var(--mute);margin-bottom:8px}
.c-comment{font-size:.82rem;color:#9090a8;margin-bottom:14px;min-height:20px;line-height:1.5}
.c-foot{display:flex;align-items:center;justify-content:space-between}
.c-time{font-size:.7rem;color:var(--mute);letter-spacing:.5px}
.join-btn{background:transparent;border:1px solid var(--grn);color:var(--grn);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:2px;cursor:pointer;transition:all .2s}
.join-btn:hover{background:rgba(74,222,128,.1);border-color:var(--grn-d)}
.state{display:flex;justify-content:center;align-items:center;gap:10px;padding:60px 0;color:var(--mute);font-size:.9rem}
.state-ico{font-size:1.5rem}
.fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 20px rgba(255,70,85,.4);transition:all .2s;z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{background:var(--red-d);transform:scale(1.08)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;width:100%;max-width:440px;overflow:hidden}
.m-bar{height:3px;background:linear-gradient(90deg,var(--red),transparent)}
.m-bar-grn{height:3px;background:linear-gradient(90deg,var(--grn),transparent)}
.m-body{padding:28px}
.m-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;color:var(--txt)}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:6px;font-family:'Rajdhani',sans-serif}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px;padding:10px 12px;color:var(--txt);font-size:.9rem;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field select option{background:var(--bg3)}
.field textarea{resize:vertical;min-height:80px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.m-foot{padding:16px 28px 24px;display:flex;justify-content:flex-end;gap:10px}
.btn-c{background:transparent;border:1px solid var(--bdr);color:var(--mute);padding:9px 20px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .2s}
.btn-c:hover{border-color:var(--mute);color:var(--txt)}
.btn-ok{background:var(--red);border:none;color:#fff;padding:9px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:background .2s}
.btn-ok:hover{background:var(--red-d)}
.btn-join{background:var(--grn);border:none;color:#000;padding:9px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:background .2s}
.btn-join:hover{background:var(--grn-d)}
.join-target-info{background:var(--bg3);border:1px solid var(--bdr2);border-radius:3px;padding:12px;margin-bottom:16px;font-size:.85rem}
.join-target-info .j-label{font-size:.65rem;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:4px}
.join-target-info .j-value{color:var(--txt);font-weight:500}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;padding:12px 20px;display:flex;align-items:center;gap:10px;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.t-dot{width:6px;height:6px;background:var(--grn);border-radius:50%}
#tmsg{font-size:.85rem}
</style>
</head>
<body>
<header>
  <div class="hdr-inner">
    <div>
      <div class="logo">play<em>ce</em></div>
      <div class="logo-sub">VALORANT PARTY FINDER</div>
    </div>
    <div class="hdr-right">
      <div class="live-badge"><div class="live-dot"></div><span id="liveCnt">0 件募集中</span></div>
      <button class="post-btn" onclick="openM()">+ 募集を投稿</button>
    </div>
  </div>
</header>
<section class="hero">
  <div class="eyebrow">VALORANT JP</div>
  <h1>野良をなくす<em>仲間を見つけろ</em></h1>
  <p class="hero-desc">ランク・モードを選んで最高のパーティを見つけよう。完全無料・登録不要。</p>
  <div class="hero-stats">
    <div><div class="stat-n" id="statN">0</div><div class="stat-l">募集中</div></div>
    <div><div class="stat-n">24h</div><div class="stat-l">常時稼働</div></div>
    <div><div class="stat-n">無料</div><div class="stat-l">完全無料</div></div>
  </div>
  <div class="divider"></div>
</section>
<div class="wrap">
  <div class="toolbar">
    <div style="display:flex;align-items:center">
      <span class="sec-title">募集一覧</span>
      <div class="filters">
        <button class="fb on" onclick="filt('all',this)">ALL</button>
        <button class="fb" onclick="filt('ランクマッチ',this)">RANK</button>
        <button class="fb" onclick="filt('アンレート',this)">UNRATED</button>
        <button class="fb" onclick="filt('スパイク争奪戦',this)">SPIKE</button>
        <button class="fb" onclick="filt('カスタム',this)">CUSTOM</button>
      </div>
    </div>
    <span class="cnt" id="cntBadge"></span>
  </div>
  <div class="grid" id="grid">
    <div class="state"><div class="state-ico">⚡</div><div class="state-t">LOADING...</div></div>
  </div>
</div>
<button class="fab" onclick="openM()">+</button>
<div class="overlay" id="ov">
  <div class="modal">
    <div class="m-bar"></div>
    <div class="m-body">
      <div class="m-title">// 募集を投稿</div>
      <div class="field"><label>ライアットID</label><input id="iN" type="text" placeholder="例: Neon#JP1" maxlength="50"></div>
      <div class="row">
        <div class="field"><label>モード</label><select id="iM"><option value="ランクマッチ">ランクマッチ</option><option value="アンレート">アンレート</option><option value="スパイク争奪戦">スパイク争奪戦</option><option value="カスタム">カスタム</option></select></div>
        <div class="field"><label>ランク帯</label><select id="iR"><option value="any">指定なし</option><option value="ブロンズ">ブロンズ</option><option value="シルバー">シルバー</option><option value="ゴールド">ゴールド</option><option value="プラチナ">プラチナ</option><option value="ダイヤモンド">ダイヤモンド</option><option value="アセンダント">アセンダント</option><option value="イモータル">イモータル</option><option value="レディアント">レディアント</option></select></div>
      </div>
      <div class="field"><label>一言コメント <span style="font-weight:400;font-size:.6rem;color:var(--mute)">(任意)</span></label><textarea id="iC" placeholder="例: VC繋ぎながらやりたい！" maxlength="100"></textarea></div>
    </div>
    <div class="m-foot">
      <button class="btn-c" onclick="closeM()">キャンセル</button>
      <button class="btn-ok" onclick="sub()">投稿する</button>
    </div>
  </div>
</div>
<div class="overlay" id="ov2">
  <div class="modal">
    <div class="m-bar-grn"></div>
    <div class="m-body">
      <div class="m-title">// 参加する</div>
      <div class="join-target-info">
        <div class="j-label">募集者</div>
        <div class="j-value" id="jTargetName">-</div>
      </div>
      <div class="join-target-info">
        <div class="j-label">モード / ランク帯</div>
        <div class="j-value" id="jTargetDetail">-</div>
      </div>
      <div class="field"><label>あなたのライアットID</label><input id="jN" type="text" placeholder="例: Sage#JP2" maxlength="50"></div>
      <div class="field"><label>一言メッセージ <span style="font-weight:400;font-size:.6rem;color:var(--mute)">(任意)</span></label><textarea id="jC" placeholder="例: よろしくお願いします！" maxlength="100"></textarea></div>
    </div>
    <div class="m-foot">
      <button class="btn-c" onclick="closeJ()">キャンセル</button>
      <button class="btn-join" onclick="joinPost()">参加する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><div class="t-dot"></div><span id="tmsg"></span></div>
<script>
const SB=window.supabase.createClient('https://qbbqppmcbdjdbkuwvnxq.supabase.co','sb_publishable_KqmpQ5cPiHv1mK8J01RkLQ_wqVia66w');
const RM={any:'指定なし','ブロンズ':'ブロンズ','シルバー':'シルバー','ゴールド':'ゴールド','プラチナ':'プラチナ','ダイヤモンド':'ダイヤモンド','アセンダント':'アセンダント','イモータル':'イモータル','レディアント':'レディアント'};
const MI={'ランクマッチ':'🏆','アンレート':'🎮','スパイク争奪戦':'💣','カスタム':'⚙️'};
let all=[],f='all',currentJoinPost=null;
async function load(){
  const{data,error}=await SB.from('recruiting_posts').select('*').order('created_at',{ascending:false});
  if(error){show([]);return;}
  all=data||[];
  document.getElementById('liveCnt').textContent=all.length+' 件募集中';
  document.getElementById('statN').textContent=all.length;
  show(f==='all'?all:all.filter(p=>p.mode===f));
}
function rankClass(r){
  const m={'ブロンズ':'bronze','シルバー':'silver','ゴールド':'gold','プラチナ':'plat','ダイヤモンド':'diamond','アセンダント':'asc','イモータル':'imm','レディアント':'rad'};
  return 'b-'+(m[r]||'any');
}
function show(posts){
  const g=document.getElementById('grid');
  document.getElementById('cntBadge').textContent=posts.length+' 件';
  if(!posts.length){g.innerHTML='<div class="state"><div class="state-ico">🎯</div><div class="state-t">NO POSTS</div></div>';return;}
  g.innerHTML=posts.map((p,i)=>{
    const r=p.rank||'any';
    const rc=rankClass(r);
    const rl=RM[r]||r;
    return '<div class="card"><div class="c-top"><div class="c-name">'+x(p.name)+'</div><span class="badge '+rc+'">'+rl+'</span></div><div class="c-mode">'+(MI[p.mode]||'🎮')+' '+x(p.mode)+'</div><div class="c-comment">'+(p.comment?x(p.comment):'')+'</div><div class="c-foot"><span class="c-time">'+t(p.created_at)+'</span><button class="join-btn" onclick="openJ('+i+')">参加する ▶</button></div></div>';
  }).join('');
}
function filt(mode,btn){f=mode;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');show(f==='all'?all:all.filter(p=>p.mode===f));}
function openM(){document.getElementById('ov').classList.add('on');}
function closeM(){document.getElementById('ov').classList.remove('on');document.getElementById('iN').value='';document.getElementById('iC').value='';}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeM();});
function openJ(i){
  const displayed=f==='all'?all:all.filter(p=>p.mode===f);
  const post=displayed[i];
  if(!post)return;
  currentJoinPost=post;
  document.getElementById('jTargetName').textContent=post.name||'-';
  document.getElementById('jTargetDetail').textContent=(MI[post.mode]||'🎮')+' '+post.mode+' / '+(RM[post.rank]||post.rank||'指定なし');
  document.getElementById('jN').value='';
  document.getElementById('jC').value='';
  document.getElementById('ov2').classList.add('on');
}
function closeJ(){document.getElementById('ov2').classList.remove('on');currentJoinPost=null;}
document.getElementById('ov2').addEventListener('click',e=>{if(e.target.id==='ov2')closeJ();});
async function sub(){
  const name=document.getElementById('iN').value.trim();
  if(!name){toast_('ライアットIDを入力してください');return;}
  const{error}=await SB.from('recruiting_posts').insert([{name,mode:document.getElementById('iM').value,rank:document.getElementById('iR').value,comment:document.getElementById('iC').value.trim()||null}]);
  if(error){toast_('エラー: '+error.message);return;}
  toast_('投稿しました！');closeM();load();
}
async function joinPost(){
  const name=document.getElementById('jN').value.trim();
  if(!name){toast_('ライアットIDを入力してください');return;}
  if(!currentJoinPost){toast_('エラー: 募集情報が見つかりません');return;}
  const{error}=await SB.from('join_requests').insert([{post_id:currentJoinPost.id,host_name:currentJoinPost.name,applicant_name:name,message:document.getElementById('jC').value.trim()||null,mode:currentJoinPost.mode}]);
  if(error){toast_('エラー: '+error.message);return;}
  toast_('参加申請を送りました！ '+currentJoinPost.name+' に連絡してください！');
  closeJ();
}
SB.channel('rc').on('postgres_changes',{event:'*',schema:'public',table:'recruiting_posts'},load).subscribe();
function toast_(msg){const e=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}
function x(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function t(d){const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return 'たった今';if(m<60)return m+'分前';const h=Math.floor(m/60);if(h<24)return h+'時間前';return Math.floor(h/24)+'日前';}
load();
</script>
</body>
</html>
